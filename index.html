<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>¡Invitación especial!</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/bodymovin/5.12.2/lottie.min.js"></script>

    <style>
        body { margin: 0; padding: 0; background-color: #f3e3c8; min-height: 100vh; overflow-x: hidden; }
        
        /* Pantalla de inicio */
        #splash-screen {
            position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            background-color: #f3e3c8; z-index: 10;
            display: flex; justify-content: center; align-items: center; cursor: pointer;
        }
        #cat-container { width: 80%; max-width: 400px; }

        /* Contenedor de la invitación */
        #invitacion-content { display: none; position: relative; }
        
        /* El confeti fijo (no se desliza) */
        #confetti-container { 
            position: fixed; top: 0; left: 0; width: 100%; height: 100%; 
            z-index: 0; pointer-events: none; 
        }
        
        /* Imágenes sobre el confeti */
        img { width: 100%; height: auto; display: block; position: relative; z-index: 1; }
    </style>
</head>
<body>

    <div id="splash-screen" onclick="iniciarInvitacion()">
        <div id="cat-container"></div>
    </div>

    <div id="invitacion-content">
        <div id="confetti-container"></div>
        <img src="tu-imagen.png" alt="Invitación 1">
        <img src="tu-imagen-1.png" alt="Invitación 2">
        <img src="tu-imagen-2.png" alt="Invitación 3">
    </div>

    <script>
        // Animación Gato
        lottie.loadAnimation({
            container: document.getElementById('cat-container'),
            renderer: 'svg', loop: true, autoplay: true, path: 'gatito.json'
        });

        // Animación Confetti (permanente y fija)
        var confeti = lottie.loadAnimation({
            container: document.getElementById('confetti-container'),
            renderer: 'svg', loop: true, autoplay: true, path: 'Confetti.json'
        });
        confeti.setSpeed(0.5); // Velocidad lenta

        function iniciarInvitacion() {
            document.getElementById('splash-screen').style.display = 'none';
            document.getElementById('invitacion-content').style.display = 'block';
        }

        document.addEventListener('contextmenu', e => e.preventDefault());
    </script>
</body>
</html>
