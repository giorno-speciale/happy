<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>¡Invitación especial!</title>
    
    <link rel="icon" type="image/png" href="favicon.png">

    <script src="https://cdnjs.cloudflare.com/ajax/libs/bodymovin/5.12.2/lottie.min.js"></script>

    <style>
        body {
            margin: 0;
            padding: 0;
            background-color: #f3e3c8; 
            min-height: 100vh;
            position: relative;
            overflow-x: hidden;
        }

        #confetti-container {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            z-index: 1; /* Fondo */
            pointer-events: none;
        }

        img {
            width: 100%;
            height: auto;
            display: block;
            position: relative;
            z-index: 2; /* Imágenes encima del confeti */
        }
    </style>
</head>
<body>

    <div id="confetti-container"></div>

    <img src="tu-imagen.png" alt="Invitación 1">
    <img src="tu-imagen-1.png" alt="Invitación 2">
    <img src="tu-imagen-2.png" alt="Invitación 3">

    <script>
        // Cargar animación
        var anim = lottie.loadAnimation({
            container: document.getElementById('confetti-container'),
            renderer: 'svg',
            loop: true,
            autoplay: true,
            path: 'Confetti.json' 
        });

        // Bloqueo de clic derecho
        document.addEventListener('contextmenu', e => e.preventDefault());
    </script>
</body>
</html>
